services:
  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: ["/var/www/docker/entrypoint.sh"]
    volumes:
      - ./:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - laravel-storage:/var/www/storage
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel-network



  # Nginx Service — port TIDAK diekspos ke host, hanya diakses oleh cloudflared
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    # Port 8000:80 diekspos untuk testing local
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx/conf.d/:/etc/nginx/conf.d/
      - laravel-storage:/var/www/storage
    depends_on:
      - app
    networks:
      - laravel-network

  # MariaDB Service
  db:
    image: mariadb:11
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      SERVICE_TAGS: dev
      SERVICE_NAME: mariadb
    # Port 3306 tidak diekspos ke host di production
    # ports:
    #   - "${DB_PORT}:3306"
    volumes:
      - laravel-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravel-network

  # phpMyAdmin — akses via SSH tunnel, tidak diekspos publik
  # Aktifkan jika diperlukan: ssh -L 8080:localhost:8080 user@vps-ip
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel_phpmyadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"  # Hanya bind ke localhost — tidak bisa diakses dari luar VPS
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - laravel-network

  # Cloudflare Tunnel (dinonaktifkan untuk local testing)
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: laravel_cloudflared
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - nginx
  #   networks:
  #     - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  laravel-data:
    driver: local
  laravel-storage:
    driver: local